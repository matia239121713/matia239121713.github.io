<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Threads OAuth Callback</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      max-width: 500px;
      padding: 2rem;
      background: #1a1a1a;
      border-radius: 12px;
      text-align: center;
    }
    code {
      display: block;
      word-break: break-all;
      background: #000;
      padding: 1rem;
      border-radius: 8px;
      margin-top: 1rem;
      color: #7fd88f;
      font-size: 0.9rem;
    }
    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      background: #7fd88f;
      cursor: pointer;
      font-weight: bold;
    }
    .aviso {
      color: #e88;
      margin-top: 1rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Código de autorización recibido</h2>
    <p>Copia este código y pégalo en tu script de autenticación:</p>
    <code id="code-output">Buscando código...</code>
    <button id="copy-btn" style="display:none;">Copiar código</button>
    <p id="error-msg" class="aviso" style="display:none;">
      No se encontró ningún parámetro "code" en la a.
    </p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const output = document.getElementById("code-output");
    const btn = document.getElementById("copy-btn");
    const errorMsg = document.getElementById("error-msg");

    if (code) {
      output.textContent = code;
      btn.style.display = "inline-block";
      btn.addEventListener("click", () => {
        navigator.clipboard.writeText(code);
        btn.textContent = "¡Copiado!";
      });
    } else {
      output.style.display = "none";
      errorMsg.style.display = "block";
    }
  </script>
</body>
</html>
